name: Publish To NPM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Resolve auth source
        id: auth_source
        run: |
          if [ -n "$NPM_PUBLISH_TOKEN" ]; then
            echo "mode=publish-token" >> "$GITHUB_OUTPUT"
            echo "token=$NPM_PUBLISH_TOKEN" >> "$GITHUB_OUTPUT"
            echo "Using NPM_PUBLISH_TOKEN secret."
          elif [ -n "$NPM_TOKEN" ]; then
            echo "mode=npm-token" >> "$GITHUB_OUTPUT"
            echo "token=$NPM_TOKEN" >> "$GITHUB_OUTPUT"
            echo "Using NPM_TOKEN secret."
          else
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            echo "token=" >> "$GITHUB_OUTPUT"
            echo "No npm token found. Workflow will try trusted publishing path."
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

      - name: Validate npm publish access with token
        if: steps.auth_source.outputs.mode != 'oidc'
        run: |
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ steps.auth_source.outputs.token }}

      - name: Check if version exists
        id: version_check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package_name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

          if npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish with pnpm
        if: steps.version_check.outputs.should_publish == 'true'
        run: |
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            if pnpm publish --access public --no-git-checks; then
              echo "Published with npm token."
            else
              echo "Token publish failed. Trying trusted publishing fallback."
              unset NODE_AUTH_TOKEN
              pnpm publish --access public --no-git-checks --provenance
            fi
          else
            pnpm publish --access public --no-git-checks --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ steps.auth_source.outputs.token }}

      - name: Skip publish
        if: steps.version_check.outputs.should_publish == 'false'
        run: |
          echo "Skipping publish. ${{ steps.version_check.outputs.package_name }}@${{ steps.version_check.outputs.package_version }} already exists."
